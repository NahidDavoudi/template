<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    body { font-family: var(--font-vazir); background-color: var(--color-dark); color: var(--color-body-text); }
    .tab-active   { border-bottom: 2px solid var(--color-accent); color: var(--color-body-text); }
    .tab-inactive { border-bottom: 2px solid transparent; color: var(--color-muted); }
    input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 30px var(--color-dark-3) inset !important;
      -webkit-text-fill-color: var(--color-body-text) !important;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-dark-2); }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
    .btn-accent-glow {
      box-shadow: 0 6px 20px color-mix(in srgb, var(--color-accent) 35%, transparent);
    }
    .logo-glow { filter: drop-shadow(0 0 8px color-mix(in srgb, var(--color-accent) 50%, transparent)); }
  </style>
  <link rel="stylesheet" href="assets/css/fonts.css">
  <link rel="stylesheet" href="assets/css/output.css">
  <link rel="shortcut icon" href="assets/images/logo.png" type="image/x-icon">
</head>
<body class="bg-body text-body font-vazir min-h-screen flex flex-col overflow-x-hidden">

  <!-- Ambient glows -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-accent/8 rounded-full blur-[140px] -translate-y-1/3 translate-x-1/4"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-accent/10 rounded-full blur-[120px] translate-y-1/3 -translate-x-1/4"></div>
  </div>

  <!-- Minimal header -->
  <header class="relative z-10 bg-body/90 backdrop-blur-md border-b border-border">
    <div class="max-w-[1280px] mx-auto px-5 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img data-store-logo src="assets/images/logo.png" alt="" class="w-9 h-9 object-contain logo-glow">
        <span data-store-name class="font-display text-xl text-body tracking-wider"></span>
      </a>
      <a href="index.html" class="text-sm text-dim hover:text-body transition-colors flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        بازگشت
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="relative z-10 flex-grow flex items-center justify-center py-10 px-4">
    <div class="w-full max-w-md">

      <!-- Brand mark -->
      <div class="text-center mb-8">
        <img data-store-logo src="assets/images/logo.png" alt="" class="w-16 h-16 object-contain mx-auto mb-4 logo-glow">
        <h1 data-store-name class="font-display text-3xl text-body mb-1"></h1>
        <p class="text-muted text-sm">ورود یا ساخت حساب کاربری</p>
      </div>

      <!-- Card -->
      <div class="bg-card border border-border rounded-2xl overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.08)]">
        <!-- Tabs -->
        <div class="flex border-b border-border">
          <button id="tab-login" type="button"
                  class="tab-active flex-1 py-4 text-sm font-bold tracking-wide transition-colors">ورود</button>
          <button id="tab-register" type="button"
                  class="tab-inactive flex-1 py-4 text-sm font-bold tracking-wide transition-colors">ثبت‌نام</button>
        </div>

        <!-- ── Login ── -->
        <div id="form-login" class="p-6 md:p-8">
          <!-- Password login -->
          <div id="login-password-panel" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-dim mb-1.5" for="login-phone">شماره همراه</label>
              <input type="text" id="login-phone" dir="rtl" autocomplete="phone"
                     placeholder="09123456789"
                     class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                            placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
            </div>
            <div>
              <div class="flex items-center justify-between mb-1.5">
                <a href="#" class="text-xs text-muted hover:text-accent transition-colors">فراموشی رمز</a>
                <label class="text-sm font-medium text-dim" for="login-password">رمز عبور</label>
              </div>
              <div class="relative">
                <input type="password" id="login-password" dir="rtl" autocomplete="current-password"
                       placeholder="••••••••"
                       class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                              placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
                <button type="button" id="toggle-login-password"
                        class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-muted/50 hover:text-muted transition-colors select-none">نمایش</button>
              </div>
            </div>
            <div class="flex items-center justify-end gap-2">
              <label for="remember" class="text-sm text-dim cursor-pointer select-none">مرا به خاطر بسپار</label>
              <input type="checkbox" id="remember" class="w-4 h-4 accent-accent rounded cursor-pointer">
            </div>
            <div id="login-error" class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-right"></div>
            <button id="login-btn"
                    class="w-full py-3.5 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-xl
                           transition-all btn-accent-glow hover:-translate-y-0.5 active:translate-y-0">
              <span id="login-btn-text">ورود به حساب</span>
            </button>
            <button id="switch-login-sms" type="button"
                    class="hidden w-full py-3 border border-border rounded-xl text-sm text-dim
                           hover:border-accent/40 hover:text-body transition-all"
                    data-auth-text="loginWithSms">
              ورود با پیامک
            </button>
          </div>

          <!-- SMS login -->
          <div id="login-sms-panel" class="hidden space-y-4">
            <p class="text-sm text-muted text-center" data-auth-text="otpSent">کد تایید به شماره شما ارسال می‌شود</p>
            <div>
              <label class="block text-sm font-medium text-dim mb-1.5" for="login-sms-phone">شماره همراه</label>
              <input type="text" id="login-sms-phone" dir="rtl" autocomplete="phone"
                     placeholder="09123456789"
                     class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                            placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
            </div>
            <div id="login-sms-otp-wrap" class="hidden space-y-3">
              <div>
                <label class="block text-sm font-medium text-dim mb-1.5" for="login-otp">کد تایید</label>
                <input type="text" id="login-otp" dir="ltr" inputmode="numeric" maxlength="5" autocomplete="one-time-code"
                       placeholder="12345"
                       class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm text-center tracking-[0.4em]
                              placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
              </div>
              <p id="login-otp-timer" class="text-xs text-muted text-center hidden"></p>
            </div>
            <div id="login-sms-error" class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-right"></div>
            <button id="login-sms-send-btn" type="button"
                    class="w-full py-3.5 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-xl transition-all btn-accent-glow">
              <span id="login-sms-send-text" data-auth-text="sendCode">ارسال کد تایید</span>
            </button>
            <button id="login-sms-verify-btn" type="button"
                    class="hidden w-full py-3.5 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-xl transition-all btn-accent-glow">
              <span id="login-sms-verify-text" data-auth-text="verifyCode">تایید و ورود</span>
            </button>
            <button id="switch-login-password" type="button"
                    class="w-full py-3 text-sm text-muted hover:text-body transition-colors"
                    data-auth-text="back">
              بازگشت به ورود با رمز
            </button>
          </div>

          <div id="login-footer-links" class="relative flex items-center gap-3 my-5">
            <div class="flex-1 h-px bg-border"></div>
            <span class="text-dim text-xs shrink-0">یا</span>
            <div class="flex-1 h-px bg-border"></div>
          </div>
          <button id="goto-register"
                  class="w-full py-3 border border-border rounded-xl text-sm text-dim
                         hover:border-accent/40 hover:text-body transition-all">
            حساب ندارید؟ <span class="text-accent font-bold">ثبت‌نام کنید</span>
          </button>
        </div>

        <!-- ─ـ Register ـ─ -->
        <div id="form-register" class="hidden p-6 md:p-8">
          <div id="register-form-panel" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm font-medium text-dim mb-1.5">نام</label>
                <input type="text" id="reg-fname" autocomplete="given-name" placeholder="نام"
                       class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                              placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
              </div>
              <div>
                <label class="block text-sm font-medium text-dim mb-1.5">نام خانوادگی</label>
                <input type="text" id="reg-lname" autocomplete="family-name" placeholder="نام خانوادگی"
                       class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                              placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-dim mb-1.5">شماره همراه</label>
              <input type="text" id="reg-phone" dir="rtl" autocomplete="phone" placeholder="09123456789"
                     class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                            placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
            </div>
            <div>
              <label class="block text-sm font-medium text-dim mb-1.5">رمز عبور</label>
              <div class="relative">
                <input type="password" id="reg-password" dir="rtl" autocomplete="new-password" placeholder="حداقل ۸ کاراکتر"
                       class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                              placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
                <button type="button" id="toggle-reg-password"
                        class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-muted/50 hover:text-muted transition-colors select-none">نمایش</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-dim mb-1.5">تکرار رمز عبور</label>
              <input type="password" id="reg-confirm" dir="rtl" autocomplete="new-password" placeholder="••••••••"
                     class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm
                            placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
            </div>
            <div class="flex items-start gap-2">
              <input type="checkbox" id="terms" class="mt-1 w-4 h-4 accent-accent rounded cursor-pointer shrink-0">
              <label for="terms" class="text-xs text-dim leading-relaxed cursor-pointer">
                با <a href="index.html#/terms" class="text-accent hover:underline">قوانین و مقررات</a> موافقم
              </label>
            </div>
            <div id="register-error" class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-right"></div>
            <button id="register-btn"
                    class="w-full py-3.5 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-xl
                           transition-all btn-accent-glow hover:-translate-y-0.5">
              <span id="register-btn-text">ثبت‌نام</span>
            </button>
          </div>

          <div id="register-otp-panel" class="hidden space-y-4">
            <p id="register-otp-hint" class="text-sm text-muted text-center"></p>
            <div>
              <label class="block text-sm font-medium text-dim mb-1.5" for="reg-otp">کد تایید</label>
              <input type="text" id="reg-otp" dir="ltr" inputmode="numeric" maxlength="5" autocomplete="one-time-code"
                     placeholder="12345"
                     class="w-full bg-surface border border-border rounded-xl px-4 py-3 text-body text-sm text-center tracking-[0.4em]
                            placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
            </div>
            <p id="register-otp-timer" class="text-xs text-muted text-center hidden"></p>
            <div id="register-otp-error" class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-right"></div>
            <button id="register-verify-btn" type="button"
                    class="w-full py-3.5 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-xl transition-all btn-accent-glow">
              <span id="register-verify-text" data-auth-text="verifyAndRegister">تایید و ساخت حساب</span>
            </button>
            <button id="register-resend-btn" type="button"
                    class="hidden w-full py-3 border border-border rounded-xl text-sm text-dim hover:border-accent/40 transition-all"
                    data-auth-text="resendCode">
              ارسال مجدد کد
            </button>
            <button id="register-back-btn" type="button"
                    class="w-full py-3 text-sm text-muted hover:text-body transition-colors"
                    data-auth-text="back">
              بازگشت
            </button>
          </div>

          <button id="goto-login"
                  class="w-full mt-4 py-3 rounded-xl text-sm text-dim
                         hover:border-accent/40 hover:text-body transition-all">
            حساب دارید؟ <span class="text-accent font-bold">وارد شوید</span>
          </button>
        </div>
      </div>
      <p id="login-copyright" class="text-center text-xs text-dim/40 mt-5"></p>
    </div>
  </main>

  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
